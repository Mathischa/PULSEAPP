<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>NN 3D Cinematic Live</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#000; }
    #hud { position:fixed; top:10px; left:10px; color:#fff; font-family:system-ui, sans-serif; font-size:14px; z-index:10; }
  </style>
</head>
<body>
<div id="hud">Connecting…</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { EffectComposer } from "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js";
import { RenderPass } from "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

const hud = document.getElementById("hud");

// ------------ Scene
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.045);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(20, 10, 22);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const dir = new THREE.DirectionalLight(0xffffff, 0.9);
dir.position.set(10, 20, 10);
scene.add(dir);

// Postprocessing Bloom (glow)
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.3, 0.6, 0.12);
composer.addPass(bloom);

// ------------ Network layout (spirale cinématique)
let nodes = [];
let nodeMesh;
let edgesGeom, edgesMat, edgesLines;
let edgeSrc = [], edgeDst = [], edgeW = [];
let nodeC = [];

function turboColor(t){
  // approximation simple: bleu->cyan->jaune->rouge (suffisant pour glow)
  const x = Math.min(1, Math.max(0, t));
  const r = Math.min(1, Math.max(0, 1.5*x));
  const g = Math.min(1, Math.max(0, 1.5*(1-Math.abs(x-0.5)*2)));
  const b = Math.min(1, Math.max(0, 1.5*(1-x)));
  return new THREE.Color(r, g, b);
}

function buildNodes(total){
  // positions en double spirale (look "galaxie")
  nodes = new Array(total);
  const turns = 9.0;
  for(let i=0;i<total;i++){
    const t = i / (total-1);
    const angle = t * Math.PI * 2 * turns;
    const radius = 3 + 12*t;
    const x = (t*40) - 20;
    const y = Math.cos(angle)*radius*0.35;
    const z = Math.sin(angle)*radius*0.35;
    nodes[i] = new THREE.Vector3(x, y, z);
  }

  // InstancedMesh pour perf
  const geo = new THREE.SphereGeometry(0.22, 12, 12);
  const mat = new THREE.MeshStandardMaterial({ emissive: 0xffffff, emissiveIntensity: 1.0, color: 0xffffff });
  nodeMesh = new THREE.InstancedMesh(geo, mat, total);

  const dummy = new THREE.Object3D();
  for(let i=0;i<total;i++){
    dummy.position.copy(nodes[i]);
    dummy.updateMatrix();
    nodeMesh.setMatrixAt(i, dummy.matrix);
    nodeMesh.setColorAt(i, turboColor(0));
  }
  nodeMesh.instanceColor.needsUpdate = true;
  scene.add(nodeMesh);
}

function buildEdges(){
  if(edgesLines) scene.remove(edgesLines);

  edgesGeom = new THREE.BufferGeometry();
  const pts = new Float32Array(edgeSrc.length * 2 * 3);
  for(let i=0;i<edgeSrc.length;i++){
    const a = nodes[edgeSrc[i]];
    const b = nodes[edgeDst[i]];
    pts[i*6+0]=a.x; pts[i*6+1]=a.y; pts[i*6+2]=a.z;
    pts[i*6+3]=b.x; pts[i*6+4]=b.y; pts[i*6+5]=b.z;
  }
  edgesGeom.setAttribute("position", new THREE.BufferAttribute(pts, 3));

  edgesMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent:true, opacity: 0.18 });
  edgesLines = new THREE.LineSegments(edgesGeom, edgesMat);
  scene.add(edgesLines);
}

function updateVisuals(){
  if(!nodeMesh || nodeC.length===0) return;

  for(let i=0;i<nodeC.length;i++){
    const c = turboColor(nodeC[i]);
    nodeMesh.setColorAt(i, c);
  }
  nodeMesh.instanceColor.needsUpdate = true;

  // Edges: on module l'opacité globale + on boost bloom via emissive nodes (déjà)
  if(edgeW.length){
    // un simple mapping: plus les poids sont forts, plus opacité ↑
    // (LineBasicMaterial ne gère pas par-segment sans shader custom, donc global)
    const avg = edgeW.reduce((a,b)=>a+b,0)/edgeW.length;
    edgesMat.opacity = 0.08 + 0.35 * avg;
  }
}

// ------------ WebSocket
let initialized = false;
const ws = new WebSocket("ws://127.0.0.1:8765");


ws.onopen = () => hud.textContent = "✅ Connected — training live";
ws.onmessage = (ev) => {
  const msg = JSON.parse(ev.data);
  hud.textContent = `Epoch ${msg.epoch} — loss ${msg.loss.toFixed(4)}`;

  nodeC = msg.node_c;
  edgeSrc = msg.edge_src;
  edgeDst = msg.edge_dst;
  edgeW = msg.edge_w;

  if(!initialized){
    buildNodes(nodeC.length);
    buildEdges();
    initialized = true;
  } else {
    // edges fixes (ici) — si tu veux rebuild souvent: buildEdges() (plus lourd)
    updateVisuals();
  }
};
ws.onerror = () => hud.textContent = "❌ WS error (server lancé ?)";

// ------------ Resize / render
addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  // petite rotation auto (cinématique)
  scene.rotation.y += 0.0012;
  composer.render();
}
animate();
</script>
</body>
</html>
